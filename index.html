<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>TAMAN PERUMAHAN WITH SATELLITE</title>
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
            html, body { width: 100%; height: 100%; padding: 0; margin: 0; display: flex; flex-direction: column; }
            header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; font-family: 'Arial', sans-serif; font-size: 24px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1001; }
            #map { width: 100%; flex-grow: 1; padding: 0; margin: 0; }
        </style>
    </head>
    <body>
        <header>TAMAN PERUMAHAN</header>
        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/LOT_POLYGON_0.js"></script>
        <script src="data/LOT_FINAL_1.js"></script>
        <script src="data/TANDASEMPADAN_2.js"></script>

        <script>
            var map = L.map('map', {
                zoomControl:true, maxZoom:28, minZoom:1
            }).fitBounds([[2.102468271398721,102.52018189275655],[2.1050056992190327,102.52429594902046]]);

            // --- ADD GOOGLE SATELLITE HERE ---
            var googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
                attribution: '&copy; Google Maps',
                maxZoom: 28
            }).addTo(map);
            // --------------------------------

            var hash = new L.Hash(map);
            var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

            // Layer Styling and Popup Logic (Simplified for brevity)
            function style_LOT_POLYGON_0_0() {
                return { color: 'rgba(35,35,35,1.0)', weight: 1.0, fill: true, fillOpacity: 0.5, fillColor: 'rgba(231,113,72,1.0)', interactive: true };
            }

            map.createPane('pane_LOT_POLYGON_0');
            map.getPane('pane_LOT_POLYGON_0').style.zIndex = 400;
            
            var layer_LOT_POLYGON_0 = new L.geoJson(json_LOT_POLYGON_0, {
                pane: 'pane_LOT_POLYGON_0',
                style: style_LOT_POLYGON_0_0,
            }).addTo(map);

            // Add Search Control
            var searchControl = new L.Control.Search({
                layer: layer_LOT_POLYGON_0,
                propertyName: 'NO.LOT',
                marker: false,
                moveToLocation: function(latlng, title, map) {
                    map.setView(latlng, 17);
                }
            });
            map.addControl(searchControl);

        </script>
    </body>
</html>
